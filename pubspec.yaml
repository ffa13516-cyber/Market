name: wholesale_erp_pos
description: Offline-first Wholesale ERP & POS system (internal store use).
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend / Persistence
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # UI
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # Hardware / Local
  mobile_scanner: ^5.2.3
  shared_preferences: ^2.3.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
